---
- name: Install Elastic agent on servers
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    elastic_agent_version: "8.18.8"
    artifact_server: "http://10.56.14.74:8443"
    siem_url: "https://10.56.14.74:8220"
    linux_enrollment_token: "QjhDN0daMEI5dU9fUE1XUVpvRjM6RnVBLUkyZ0lSMlNJOWRFR1FKQ0JqUQ=="
    linux_temp_dir: "/tmp/elastic-agent"

  tasks:
    - name: Créer le répertoire temporaire pour Linux
      file:
        path: "{{ linux_temp_dir }}"
        state: directory
        mode: '0755'

    - name: Télécharger l'agent Elastic pour Linux
      get_url:
        url: "{{ artifact_server }}/artifacts/beats/elastic-agent/elastic-agent-{{ elastic_agent_version }}-linux-x86_64.tar.gz"
        dest: "{{ linux_temp_dir }}/elastic-agent-{{ elastic_agent_version }}-linux-x86_64.tar.gz"
        mode: '0644'

    - name: Décompresser l'archive de l'agent Elastic pour Linux
      unarchive:
        src: "{{ linux_temp_dir }}/elastic-agent-{{ elastic_agent_version }}-linux-x86_64.tar.gz"
        dest: "{{ linux_temp_dir }}"
        remote_src: yes
        creates: "{{ linux_temp_dir }}/elastic-agent-{{ elastic_agent_version }}-linux-x86_64"

    - name: Install Elastic agent with force option (non-interactive)
      shell: |
        cd "{{ linux_temp_dir }}/elastic-agent/elastic-agent-8.18.8-linux-x86_64"
        sudo ./elastic-agent install \
          --url={{ siem_url }} \
          --enrollment-token={{ linux_enrollment_token }} \
          --insecure \
          --force
      register: install_result

    - name: Display installation output
      debug:
        var: install_result.stdout_lines
      when: install_result is defined

    - name: Vérifier que l'agent Elastic est installé et en cours d'exécution
      command: systemctl status elastic-agent
      register: service_status
      ignore_errors: yes

    - name: Afficher le statut du service
      debug:
        var: service_status.stdout_lines
      when: service_status is defined

    - name: Nettoyer les fichiers temporaires Linux
      file:
        path: "{{ linux_temp_dir }}"
        state: absent
